<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stryde | Product Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <h2>STRYDE</h2>
    <div> 
      <a href="index.html">Shop</a>
      <a href="profile.html">Profile</a>
    </div>
  </nav>

  <div class="container" id="product-container">
    <h2>Loading product details...</h2>
  </div>

  <div class="container">
    <h3>Customer Reviews</h3>
    <div id="reviews-container">
      <p>Loading reviews...</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    const supabaseUrl = 'https://uwltytozmakzpdsyakzg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3bHR5dG96bWFrenBkc3lha3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTg3ODksImV4cCI6MjA5NTI3NDc4OX0.3Ow9gIb_87KY6gBrVAN9jJUTp4biJMIemDKoG17NetE';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Get the shoe ID from the browser URL address bar
    const urlParams = new URLSearchParams(window.location.search);
    const shoeId = parseInt(urlParams.get('id'));

    let activeProfileName = "Anonymous User";
    let activeUserEmail = ""; 
    let currentShoe = null;

    // Main controller function
    async function initProductPage() {
      if (!shoeId) {
        document.getElementById('product-container').innerHTML = "<h1>No product selected.</h1>";
        return;
      }

      await fetchShoeDetails();
      await checkUserLoginStatus();
    }

    // Fetch Single Shoe Data & Inject Faithox Widget
    async function fetchShoeDetails() {
      const { data: shoe, error } = await supabaseClient
        .from('shoes')
        .select('*')
        .eq('id', shoeId)
        .single();

      if (error || !shoe) {
        document.getElementById('product-container').innerHTML = "<h1>Shoe not found.</h1>";
        return;
      }

      currentShoe = shoe; 

      // Render the shoe layout
      document.getElementById('product-container').innerHTML = `
        <div style="display: flex; gap: 3rem; background: white; padding: 2rem; border-radius: 8px; margin-bottom: 2rem; flex-wrap: wrap;">
          <img src="${shoe.image || shoe.img}" style="max-width: 450px; width: 100%; border-radius: 8px; object-fit: cover;">
          <div style="flex: 1; min-width: 300px;">
            <h1>${shoe.name}</h1>
            <h2 class="price" style="font-size: 2rem; margin: 1rem 0;">$${shoe.price.toFixed(2)}</h2>
            <p style="line-height: 1.6; color: #555;">${shoe.description}</p>
            
            <button onclick="payWithRazorpay()" style="margin-top: 2rem; max-width: 250px;">Buy Now</button>
          </div>
        </div>
      `;

      // 🟢 THE MAGIC: Inject the Faithox Widget using Stryde's faithox_product_id
      const reviewsDiv = document.getElementById('reviews-container');
      
      if (shoe.faithox_product_id) {
          const liveUrl = `https://faithox.com/embed.html?id=${shoe.faithox_product_id}`;
          reviewsDiv.innerHTML = `
            <iframe 
  src="${liveUrl}"  
  width="100%" 
 "max-width: 1204px; 
 height="350px" 
  style="border: none; background: transparent; overflow: hidden; display: block; margin: 0 auto;">
            </iframe>
          `;
      } else {
          reviewsDiv.innerHTML = "<p style='color:#777;'>This product is not yet registered on Faithox.</p>";
      }
    }

    // Check User Session for Razorpay Prefill
    async function checkUserLoginStatus() {
      const { data: { session } } = await supabaseClient.auth.getSession();
      
      if (session) {
        activeUserEmail = session.user.email;
        
        const { data: profile } = await supabaseClient
          .from('profiles')
          .select('full_name')
          .eq('user_id', session.user.id)
          .single();
          
        if (profile && profile.full_name) {
          activeProfileName = profile.full_name;
        } else {
          activeProfileName = session.user.email; 
        }
      }
    }

    // Razorpay Checkout Controller
    function payWithRazorpay() {
      if (!currentShoe) {
        alert("Shoe data hasn't loaded yet. Please wait a second.");
        return;
      }

      const amountInSmallestUnit = Math.round(currentShoe.price * 100);

      const options = {
        "key": "rzp_test_T3ClHGCf52v7k8", 
        "amount": amountInSmallestUnit,
        "currency": "INR", 
        "name": "Stryde",
        "description": "Purchase: " + currentShoe.name,
        
        "handler": async function (response) {
          alert("Payment Successful!\nPayment ID: " + response.razorpay_payment_id);

          const { data: { session } } = await supabaseClient.auth.getSession();
          
          if (session) {
            const { error } = await supabaseClient
              .from('orders')
              .insert([
                { 
                  user_id: session.user.id, 
                  shoe_id: currentShoe.id,
                  payment_id: response.razorpay_payment_id,
                  amount_paid: currentShoe.price,
                  status: 'Paid'
                }
              ]);

            if (error) {
              console.error("Database error:", error);
              alert("Payment worked, but there was an error saving your receipt.");
              return;
            }
          } else {
            alert("Warning: You were not logged in, so this order couldn't be saved to a profile.");
          }

          window.location.href = "profile.html"; 
        },
        
        "prefill": {
          "name": activeProfileName,
          "email": activeUserEmail
        },
        "notes": {
          "store_name": "stryde", 
          "product_name": currentShoe.name,
          "faithox_product_id": currentShoe.faithox_product_id 
        },
        "theme": {
          "color": "#000000" 
        }
      };

      const rzp = new window.Razorpay(options);
      
      rzp.on('payment.failed', function (response){
        alert("Payment Failed: " + response.error.description);
      });

      rzp.open();
    }

    // Start everything on page load
    initProductPage();
  </script>
</body>
</html>
