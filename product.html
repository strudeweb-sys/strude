<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stryde | Product</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <h2>STRYDE</h2>
    <div>
      <a href="index.html">Shop</a>
      <a href="profile.html">Profile</a>
      <a href="admin.html">Admin</a>
    </div>
  </nav>

  <div class="container" id="product-container">
    </div>

  <div class="container">
    <h3>Customer Reviews</h3>
    <div id="reviews-container">
      </div>
  </div>

  <script src="data.js"></script>
  <script>
    // Get shoe ID from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const shoeId = parseInt(urlParams.get('id'));

    // Find the shoe in our mock database
    const shoe = mockShoes.find(s => s.id === shoeId);
    
    if (shoe) {
      document.getElementById('product-container').innerHTML = `
        <div style="display: flex; gap: 3rem; background: white; padding: 2rem; border-radius: 8px;">
          <img src="${shoe.img}" style="max-width: 50%; border-radius: 8px;">
          <div>
            <h1>${shoe.name}</h1>
            <h2 class="price">$${shoe.price.toFixed(2)}</h2>
            <p>${shoe.description}</p>
            <button style="margin-top: 2rem;">Add to Cart</button>
          </div>
        </div>
      `;

      // Filter and display reviews for THIS specific shoe
      const shoeReviews = mockReviews.filter(r => r.shoeId === shoeId);
      const reviewsDiv = document.getElementById('reviews-container');
      
      if (shoeReviews.length > 0) {
        shoeReviews.forEach(rev => {
          reviewsDiv.innerHTML += `
            <div class="review-card">
              <strong>${rev.user}</strong> (Rating: ${rev.rating}/5)
              <p>${rev.text}</p>
            </div>
          `;
        });
      } else {
        reviewsDiv.innerHTML = "<p>No reviews yet. Be the first!</p>";
      }
    } else {
      document.getElementById('product-container').innerHTML = "<h1>Shoe not found.</h1><a href='index.html'>Go back</a>";
    }
  </script>
</body>
</html>
