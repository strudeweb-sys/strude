<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Strude shoes 2</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #f5f0e8;
      --cream: #ede8dc;
      --accent: #c8412a;
      --gray: #9a9490;
      --card-bg: #1a1a1a;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 60px;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      background: var(--black);
      z-index: 100;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 4px;
      color: var(--white);
      text-decoration: none;
    }
    nav a {
      color: var(--gray);
      text-decoration: none;
      margin-left: 32px;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    nav a:hover { color: var(--white); }

    /* HERO PRODUCT */
    .product-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 90vh;
    }

    .product-image-wrap {
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }
    .product-image-wrap::before {
      content: 'STRYDE';
      position: absolute;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14rem;
      color: rgba(0,0,0,0.06);
      letter-spacing: 10px;
      pointer-events: none;
    }
    .product-image-wrap img {
      width: 100%;
      max-width: 480px;
      transform: rotate(-8deg);
      filter: drop-shadow(0 30px 60px rgba(0,0,0,0.35));
      transition: transform 0.4s ease;
    }
    .product-image-wrap img:hover { transform: rotate(-4deg) scale(1.03); }

    .product-info {
      padding: 80px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .product-tag {
      font-size: 0.75rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .product-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5rem;
      line-height: 0.95;
      letter-spacing: 2px;
      color: var(--white);
      margin-bottom: 24px;
    }
    .product-desc {
      color: var(--gray);
      font-size: 0.95rem;
      line-height: 1.7;
      max-width: 380px;
      margin-bottom: 40px;
    }
    .product-price {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      color: var(--white);
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    .size-label {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 12px;
    }
    .sizes {
      display: flex;
      gap: 10px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }
    .size-btn {
      width: 48px;
      height: 48px;
      border: 1px solid #333;
      background: none;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .size-btn:hover, .size-btn.active {
      background: var(--white);
      color: var(--black);
      border-color: var(--white);
    }
    .btn-cart {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: var(--accent);
      color: var(--white);
      border: none;
      padding: 18px 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
      max-width: 280px;
    }
    .btn-cart:hover { opacity: 0.85; transform: translateY(-2px); }

    /* DIVIDER */
    .section-divider {
      text-align: center;
      padding: 80px 60px 40px;
    }
    .section-divider h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      letter-spacing: 4px;
      color: var(--white);
    }
    .divider-line {
      width: 60px;
      height: 2px;
      background: var(--accent);
      margin: 16px auto 0;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid #222;
      text-align: center;
      padding: 32px;
      color: var(--gray);
      font-size: 0.8rem;
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      .product-section { grid-template-columns: 1fr; }
      .product-info, header { padding: 32px 24px; }
      .product-name { font-size: 3.5rem; }
      .faithox-wrapper { padding: 0 24px 60px !important; }
    }
  </style>
</head>
<body>

<header>
  <a href="#" class="logo">Stryde</a>
  <nav>
    <a href="#">Shop</a>
    <a href="#reviews">Reviews</a>
    <a href="#">About</a>
  </nav>
</header>

<section class="product-section">
  <div class="product-image-wrap">
    <img src="https://images.puma.com/image/upload/f_auto,q_auto,b_rgb:fafafa,w_2000,h_2000/global/406000/01/sv01/fnd/IND/fmt/png/Palermo-Premium-Leather-Sneakers" alt="Stryde Shoe 1" />
  </div>
  <div class="product-info">
    <p class="product-tag">New Drop — 2025</p>
    <h1 class="product-name">Runner<br>X1</h1>
    <p class="product-desc">
      Engineered for the streets. Lightweight mesh upper, carbon-fiber reinforced sole, and a silhouette that turns heads. Built for speed, worn for style.
    </p>
    <div class="product-price">$189.00</div>
    <p class="size-label">Select Size (US)</p>
    <div class="sizes">
      <button class="size-btn" onclick="selectSize(this)">7</button>
      <button class="size-btn" onclick="selectSize(this)">8</button>
      <button class="size-btn active" onclick="selectSize(this)">9</button>
      <button class="size-btn" onclick="selectSize(this)">10</button>
      <button class="size-btn" onclick="selectSize(this)">11</button>
      <button class="size-btn" onclick="selectSize(this)">12</button>
    </div>
    <button class="btn-cart" onclick="addToCart()">
      Add to Cart →
    </button>
  </div>
</section>

<div class="section-divider" id="reviews">
  <h2>Customer Reviews</h2>
  <div class="divider-line"></div>
</div>
<div style="max-width: 1000px; margin: 0 auto; padding: 0 60px 80px;">
    

<iframe 
  src="https://faithoxweb.vercel.app/embed.html?id=9646e56e-361b-4714-953e-0d6f6576eb6a" 
  width="80%" 
  height="300px" 
  style="border: none; background: transparent; overflow: hidden; display: block; margin: 0 auto;">
</iframe>
</div>

  </body>
  </html>
