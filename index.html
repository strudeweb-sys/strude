<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stryde | Premium Footwear</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <h2>STRYDE</h2>
    <div>
      <a href="index.html">Shop</a>
      <a href="login.html">Profile</a>
      <a href="admin.html">Admin</a>
    </div>
  </nav>

  <div class="container">
    <h1>Latest Drops</h1>
    <div class="shoe-grid" id="shoe-grid">
      </div>
  </div>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // 1. Renamed to supabaseClient here too!
    const supabaseUrl = 'https://uwltytozmakzpdsyakzg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3bHR5dG96bWFrenBkc3lha3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTg3ODksImV4cCI6MjA5NTI3NDc4OX0.3Ow9gIb_87KY6gBrVAN9jJUTp4biJMIemDKoG17NetE';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    const grid = document.getElementById('shoe-grid');

    async function loadShoes() {
      // 2. Make sure you use supabaseClient here to fetch the data
      const { data: shoes, error } = await supabaseClient
        .from('shoes')
        .select('*');

      if (error) {
        console.error("Error fetching shoes:", error);
        return;
      }

      shoes.forEach(shoe => {
        const card = document.createElement('div');
        card.className = 'shoe-card';
        card.innerHTML = `
          <img src="${shoe.image}" alt="${shoe.name}">
          <div class="shoe-info">
            <h3>${shoe.name}</h3>
            <p class="price">$${shoe.price.toFixed(2)}</p>
            <a href="product.html?id=${shoe.id}" class="btn">View Details</a>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    loadShoes();
  </script>
</body>
</html>
