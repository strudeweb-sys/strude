<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stryde | Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <h2>STRYDE <span style="color:var(--accent); font-size:1rem;">ADMIN</span></h2>
    <div>
      <a href="index.html">View Store</a>
    </div>
  </nav>

  <div class="container">
    <h1 style="text-align: center;">Add New Shoe</h1>
    <form id="add-shoe-form">
      <div>
        <label>Shoe Name</label>
        <input type="text" id="name" required placeholder="e.g. Stryde Air">
      </div>
      <div>
        <label>Price ($)</label>
        <input type="number" id="price" required placeholder="120.00" step="0.01">
      </div>
      <div>
        <label>Image URL</label>
        <input type="url" id="image" required placeholder="https://...">
      </div>
      <div>
        <label>Description</label>
        <textarea id="desc" rows="4" required></textarea>
      </div>
      <button type="submit">Add Product to Store</button>
    </form>
  </div>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // 1. We renamed this to supabaseClient to avoid clashes!
    const supabaseUrl = 'https://uwltytozmakzpdsyakzg.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3bHR5dG96bWFrenBkc3lha3pnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTg3ODksImV4cCI6MjA5NTI3NDc4OX0.3Ow9gIb_87KY6gBrVAN9jJUTp4biJMIemDKoG17NetE';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById('add-shoe-form').addEventListener('submit', async function(e) {
      e.preventDefault(); 
      
      const shoeName = document.getElementById('name').value;
      const shoePrice = parseFloat(document.getElementById('price').value);
      const shoeImg = document.getElementById('image').value;
      const shoeDesc = document.getElementById('desc').value;

      // 2. Make sure it says supabaseClient here too
      const { data, error } = await supabaseClient
        .from('shoes')
        .insert([
          { name: shoeName, price: shoePrice, image: shoeImg, description: shoeDesc }
        ]);

      if (error) {
        alert("Error adding shoe: " + error.message);
      } else {
        alert("Shoe added successfully!");
        this.reset(); 
      }
    });
  </script>
